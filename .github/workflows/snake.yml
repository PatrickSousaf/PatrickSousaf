name: Snake animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ✅ necessário para fazer push

    steps:
      # 1️⃣ Puxa o repositório
      - uses: actions/checkout@v4  # ✅ v3 → v4

      # 2️⃣ Gera a Snake
      - name: Generate Snake
        uses: platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: github-snake.svg  # ✅ sem comentário inline

      # 3️⃣ Commit e push do SVG gerado
      - name: Commit Snake
        run: |
          git config --local user.name "github-actions"
          git config --local user.email "github-actions@github.com"
          git add github-snake.svg
          git commit -m "Update Snake animation" || echo "No changes to commit"
          git push